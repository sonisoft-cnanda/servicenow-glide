name: Sync Upstream @servicenow/glide

on:
  # Run weekly on Monday at 8am UTC
  schedule:
    - cron: '0 8 * * 1'
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific version to sync (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check for upstream updates (dry run)
        id: check
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            node scripts/sync.js --version "${{ github.event.inputs.version }}" --dry-run 2>&1 | tee sync-output.txt
          else
            node scripts/sync.js --dry-run 2>&1 | tee sync-output.txt
          fi
          # Check if there are any changes
          if grep -q "Added:     0" sync-output.txt && grep -q "Updated:   0" sync-output.txt; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Run sync
        if: steps.check.outputs.has_changes == 'true'
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            node scripts/sync.js --version "${{ github.event.inputs.version }}"
          else
            node scripts/sync.js
          fi

      - name: Verify build
        if: steps.check.outputs.has_changes == 'true'
        run: npm run build

      - name: Get upstream version
        if: steps.check.outputs.has_changes == 'true'
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync with @servicenow/glide@${{ steps.version.outputs.version }}"
          title: "chore: sync with @servicenow/glide@${{ steps.version.outputs.version }}"
          body: |
            Automated sync with upstream `@servicenow/glide@${{ steps.version.outputs.version }}`.

            ## Changes
            See commit diff for details on added/updated/removed type stubs.

            ## Verification
            - TypeScript compilation: Passed
            - Build: Passed
          branch: chore/sync-upstream-${{ steps.version.outputs.version }}
          delete-branch: true
